<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Netflix Control Button</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>Netflix Control Button</h1>
    <div class="grid">
      <button data-seconds="5">+5 sn</button>
      <button data-seconds="10">+10 sn</button>
      <button data-seconds="15">+15 sn</button>
      <button data-seconds="30">+30 sn</button>
      <button data-seconds="45">+45 sn</button>
      <button data-seconds="60">+60 sn</button>
      <button data-seconds="120">+120 sn</button>
    </div>
    <p id="status">Netflix video must be open.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
